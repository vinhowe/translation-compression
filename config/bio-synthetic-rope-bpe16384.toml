# Bio3-style synthetic fact learning experiment
# Bio data: 100K people, multi5 phrasings, tokenized with bpe16384
# Model: GPT-2 small scale (12-layer, 768-dim) with RoPE and compartment embeddings
# All compartments see all facts (single source), translation pairs are identical copies

[data]
# Generate with: uv run python scripts/generate_bio_dataset.py --n_people 100000 --n_phrasings 5
train_bin = "data/bio-synthetic-bpe16384-N100000-multi5-seed42/bio_train_*.bin"
val_bin = "data/bio-synthetic-bpe16384-N100000-multi5-seed42/bio_val_*.bin"

[model]
n_layer = 12
n_head = 12        # d_head = 64, matching Bio3's GPT-2 small
n_embd = 768
block_size = 512
vocab_size = 16384
weight_tying = false
use_rope = true

[training]
max_iters = 80000
batch_size = 96
gradient_accumulation_steps = 1
eval_interval = 1000
always_save_checkpoints = true
eval_iters = 1
log_interval = 10

[optimizer]
learning_rate = 1e-3
weight_decay = 0.1

[system]
compile = true
dtype = "bfloat16"

[logging]
wandb_log = true
wandb_project = "translation-compression"
wandb_run_name = "bio-synthetic-rope-bpe16384"
wandb_notes = "Bio3-style synthetic fact learning with compartment embeddings"
wandb_group = "bio-synthetic"

[experiment]
n_compartments = 1
compartment_scaling = "equal"
translation_ratio = 0
max_compartments = 8
use_compartment_embeddings = true
permute_tokens_per_compartment = false
