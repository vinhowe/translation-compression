[data]
train_bin = "data/fineweb350B-dedup-bpe16384/fineweb350b-dedup_train_*.bin"
val_bin = "data/fineweb350B-dedup-bpe16384/fineweb350b-dedup_val_*.bin"

[model]
n_layer = 8
n_head = 4
n_embd = 256
block_size = 64
vocab_size = 16384
weight_tying = false
use_rope = true

[training]
max_iters = 1e6
batch_size = 1024
gradient_accumulation_steps = 2
eval_interval = 500
always_save_checkpoints = true
eval_iters = 1
seed = 64
log_interval = 10

[optimizer]
learning_rate = 2e-5
weight_decay = 0

[system]
compile = true
dtype = "bfloat16"

[logging]
wandb_log = true
wandb_project = "translation-compression"
wandb_run_name = "english-copyemb-8comp-rope-bpe16384-8-256"
wandb_notes = "English 8-comp baseline with copied initial embeddings; RoPE, 8 layers, 256 hidden"
wandb_group = "synthetic-compartment-baselines"

[experiment]
n_compartments = 8
compartment_scaling = "equal"
translation_ratio = 0
max_compartments = 16
assignment_seed = 64
use_compartment_embeddings = true
permute_tokens_per_compartment = false
copy_compartment_embeddings = true
copy_compartment_lm_head = true
copy_compartment_id_embeddings = true
